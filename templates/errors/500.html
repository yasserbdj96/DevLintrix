<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .error-container { text-align: center; color: white; }
        .error-code { font-size: 120px; font-weight: bold; margin: 0; }
        .error-message { font-size: 24px; margin: 20px 0; }
        .error-description { font-size: 16px; opacity: 0.9; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 12px 30px; background: white; color: #f5576c; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <div class="error-message">Internal Server Error</div>
        <div class="error-description">Something went wrong on our end. Please try again later.</div>
        <a href="/" class="btn">Go Home</a>
    </div>
</body>
</html>
